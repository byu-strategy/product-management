<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1000" height="600" fill="#ffffff"/>

  <text x="500" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#002E5D">One idea, four disciplines</text>
  <text x="500" y="70" text-anchor="middle" font-size="15" fill="#5a6672">Each measure of profit recognizes one more cost than the one above it.</text>

  <!-- ============ the revenue bar, segmented into the four claims ============ -->
  <!-- x: 200..860 (width 660). VC 290, FC 132, NP 92, EP 146 -->
  <!-- top identity -->
  <path d="M 200 108 L 200 100 L 860 100 L 860 108" fill="none" stroke="#002E5D" stroke-width="1.5"/>
  <text x="530" y="92" text-anchor="middle" font-size="14.5" font-weight="700" fill="#002E5D">Revenue = VC + FC + NP + EP</text>

  <text x="185" y="150" text-anchor="end" font-size="14" font-weight="700" fill="#3d4750">Revenue</text>
  <!-- segments -->
  <rect x="200" y="118" width="290" height="60" fill="#5a6672" fill-opacity="0.14" stroke="#ffffff" stroke-width="1.5"/>
  <rect x="490" y="118" width="132" height="60" fill="#0057B8" fill-opacity="0.12" stroke="#ffffff" stroke-width="1.5"/>
  <rect x="622" y="118" width="92"  height="60" fill="#0057B8" fill-opacity="0.24" stroke="#ffffff" stroke-width="1.5"/>
  <rect x="714" y="118" width="146" height="60" fill="#002E5D" fill-opacity="0.34" stroke="#ffffff" stroke-width="1.5"/>
  <!-- outer border -->
  <rect x="200" y="118" width="660" height="60" fill="none" stroke="#002E5D" stroke-width="1.5"/>
  <!-- segment labels -->
  <text x="345" y="145" text-anchor="middle" font-size="12.5" fill="#3d4750">Variable costs</text>
  <text x="345" y="162" text-anchor="middle" font-size="10.5" fill="#8a939c">VC</text>
  <text x="556" y="145" text-anchor="middle" font-size="12.5" fill="#3d4750">Fixed costs</text>
  <text x="556" y="162" text-anchor="middle" font-size="10.5" fill="#8a939c">FC</text>
  <text x="668" y="145" text-anchor="middle" font-size="12" fill="#3d4750">Normal</text>
  <text x="668" y="161" text-anchor="middle" font-size="10.5" fill="#8a939c">NP</text>
  <text x="787" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#002E5D">Econ. profit</text>
  <text x="787" y="162" text-anchor="middle" font-size="10.5" fill="#5a6672">EP</text>

  <!-- ============ dashed alignment guides down from segment boundaries ============ -->
  <g stroke="#c7cdd3" stroke-width="1" stroke-dasharray="3 4">
    <line x1="490" y1="178" x2="490" y2="500"/>
    <line x1="622" y1="178" x2="622" y2="500"/>
    <line x1="714" y1="178" x2="714" y2="500"/>
    <line x1="860" y1="178" x2="860" y2="500"/>
  </g>

  <!-- ============ each measure as a span of the segments it keeps ============ -->
  <!-- Producer surplus: FC..EP  (490..860) -->
  <rect x="490" y="228" width="370" height="34" fill="#0057B8" fill-opacity="0.16" stroke="#002E5D" stroke-width="1.2"/>
  <text x="675" y="250" text-anchor="middle" font-size="12.5" fill="#3d4750">keeps FC + NP + EP</text>
  <text x="470" y="245" text-anchor="end" font-size="14" font-weight="700" fill="#3d4750">Producer surplus</text>
  <text x="470" y="262" text-anchor="end" font-size="11" fill="#8a939c">microeconomics · R − VC</text>

  <!-- Accounting profit: NP..EP (622..860) -->
  <rect x="622" y="298" width="238" height="34" fill="#0057B8" fill-opacity="0.20" stroke="#002E5D" stroke-width="1.2"/>
  <text x="741" y="320" text-anchor="middle" font-size="12.5" fill="#3d4750">keeps NP + EP</text>
  <text x="602" y="315" text-anchor="end" font-size="14" font-weight="700" fill="#3d4750">Accounting profit</text>
  <text x="602" y="332" text-anchor="end" font-size="11" fill="#8a939c">accounting · R − explicit costs</text>

  <!-- Economic profit: EP (714..860) -->
  <rect x="714" y="368" width="146" height="34" fill="#002E5D" fill-opacity="0.30" stroke="#002E5D" stroke-width="1.4"/>
  <text x="787" y="390" text-anchor="middle" font-size="12.5" font-weight="700" fill="#002E5D">EP</text>
  <text x="694" y="385" text-anchor="end" font-size="14" font-weight="700" fill="#002E5D">Economic profit</text>
  <text x="694" y="402" text-anchor="end" font-size="11" fill="#8a939c">economics · after all costs</text>

  <!-- Financial EP: same span, restated -->
  <rect x="714" y="438" width="146" height="34" fill="none" stroke="#002E5D" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="787" y="460" text-anchor="middle" font-size="11.5" fill="#002E5D">same sliver</text>
  <text x="694" y="452" text-anchor="end" font-size="14" font-weight="700" fill="#002E5D">Financial EP</text>
  <text x="694" y="469" text-anchor="end" font-size="11" fill="#8a939c">finance · (ROIC − WACC) × capital</text>

  <!-- ============ caption ============ -->
  <text x="500" y="540" text-anchor="middle" font-size="13.5" fill="#5a6672">Read down the ladder: each measure drops one more cost from the left. The residual on the right,</text>
  <text x="500" y="560" text-anchor="middle" font-size="13.5" fill="#5a6672">economic profit, is the same sliver that finance restates as return above the cost of capital.</text>
</svg>
