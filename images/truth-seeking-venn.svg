<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 790" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="evScale" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0057B8"/>
      <stop offset="1" stop-color="#e9eef5"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1120" height="790" fill="#ffffff"/>

  <!-- Title -->
  <text x="500" y="46" text-anchor="middle" font-size="27" font-weight="700" fill="#002E5D">Your Beliefs vs. the Truth About Your Customer</text>
  <text x="500" y="74" text-anchor="middle" font-size="15" fill="#5a6672">Every product belief sits somewhere on this map. The job is to move it toward the middle, and upward.</text>

  <!-- Circle group labels -->
  <text x="300" y="126" text-anchor="middle" font-size="16" font-weight="700" letter-spacing="1.5" fill="#002E5D">WHAT YOU BELIEVE</text>
  <text x="760" y="126" text-anchor="middle" font-size="16" font-weight="700" letter-spacing="1.5" fill="#8A5A00">WHAT'S TRUE</text>

  <!-- Circles -->
  <circle cx="400" cy="440" r="270" fill="#0057B8" fill-opacity="0.06" stroke="#002E5D" stroke-width="2.5"/>
  <circle cx="660" cy="440" r="270" fill="#E1A200" fill-opacity="0.07" stroke="#8A5A00" stroke-width="2.5"/>

  <!-- Evidence threshold line -->
  <line x1="120" y1="440" x2="905" y2="440" stroke="#9aa4ad" stroke-width="1.5" stroke-dasharray="7 6"/>
  <text x="150" y="431" font-size="12.5" font-style="italic" fill="#6b7580">enough evidence to act</text>

  <!-- Evidence scale bar -->
  <text x="1006" y="205" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3d4750">MORE</text>
  <text x="1006" y="222" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3d4750">evidence</text>
  <rect x="991" y="238" width="30" height="330" rx="6" fill="url(#evScale)" stroke="#c7ccd2" stroke-width="1"/>
  <line x1="985" y1="403" x2="1027" y2="403" stroke="#6b7580" stroke-width="1.5"/>
  <text x="1006" y="592" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3d4750">LESS</text>
  <text x="1006" y="609" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3d4750">evidence</text>

  <!-- ===== Region: False Confidence (belief, not true, high evidence) ===== -->
  <g>
    <rect x="164" y="281" width="172" height="30" rx="15" fill="#C0392B"/>
    <text x="250" y="301" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">False Confidence</text>
    <text x="250" y="333" text-anchor="middle" font-size="12.5" fill="#3d4750">Sure. Never checked.</text>
    <text x="250" y="350" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8a949d">(Delusion)</text>
  </g>

  <!-- ===== Region: Unfounded Hunch (belief, not true, low evidence) ===== -->
  <g>
    <rect x="164" y="526" width="172" height="30" rx="15" fill="#E67E22"/>
    <text x="250" y="546" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Unfounded Hunch</text>
    <text x="250" y="578" text-anchor="middle" font-size="12.5" fill="#3d4750">A guess you like.</text>
    <text x="250" y="595" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8a949d">(Vain Faith)</text>
  </g>

  <!-- ===== Region: Validated Insight (belief + true, high evidence) ===== -->
  <g>
    <rect x="444" y="281" width="172" height="30" rx="15" fill="#0057B8"/>
    <text x="530" y="301" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Validated Insight</text>
    <text x="530" y="333" text-anchor="middle" font-size="12.5" fill="#3d4750">Tested. It held.</text>
    <text x="530" y="350" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8a949d">(Knowledge)</text>
  </g>

  <!-- ===== Region: Founded Bet (belief + true, low evidence) ===== -->
  <g>
    <rect x="444" y="526" width="172" height="30" rx="15" fill="#4A90D9"/>
    <text x="530" y="546" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Founded Bet</text>
    <text x="530" y="578" text-anchor="middle" font-size="12.5" fill="#3d4750">Reasoned, ahead of proof.</text>
    <text x="530" y="595" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8a949d">(True Faith)</text>
  </g>

  <!-- ===== Region: Available but Unseen (true, not believed, high evidence) ===== -->
  <g>
    <rect x="724" y="281" width="172" height="30" rx="15" fill="#B7791F"/>
    <text x="810" y="301" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Available, Unseen</text>
    <text x="810" y="333" text-anchor="middle" font-size="12.5" fill="#3d4750">One interview away.</text>
    <text x="810" y="350" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8a949d">(Unawareness)</text>
  </g>

  <!-- ===== Region: Undiscovered Need (true, not believed, low evidence) ===== -->
  <g>
    <rect x="724" y="526" width="172" height="30" rx="15" fill="#4A6572"/>
    <text x="810" y="546" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Undiscovered Need</text>
    <text x="810" y="578" text-anchor="middle" font-size="12.5" fill="#3d4750">Nobody's named it yet.</text>
    <text x="810" y="595" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8a949d">(Uncharted)</text>
  </g>

  <!-- Bottom caption -->
  <text x="500" y="762" text-anchor="middle" font-size="13.5" fill="#5a6672">Move beliefs into the overlap (make them true) and above the line (get evidence) before you build.</text>
</svg>
