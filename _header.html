<!-- Sidebar title: add cross-listed course numbers and relocate the version chip -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var title = document.querySelector('.sidebar-title');
    if (!title) return;

    // Cross-listed course numbers, shown directly under the title.
    if (!document.querySelector('.sidebar-course-numbers')) {
      var nums = document.createElement('div');
      nums.className = 'sidebar-course-numbers';
      nums.textContent = 'MSB 341 · IS 693R · C S 498R';
      title.insertAdjacentElement('afterend', nums);
    }

    // Move the footer version chip up next to the title.
    var chip = document.getElementById('site-version-chip');
    if (chip && !title.contains(chip)) {
      title.appendChild(chip);
      var sep = document.querySelector('.footer-version-sep');
      if (sep) sep.remove();
    }
  });
</script>
